<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CashVibe — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060610;--s1:#0c0c1e;--s2:#11112a;
  --border:rgba(255,255,255,0.07);
  --g1:#00f5c4;--g1d:rgba(0,245,196,0.1);
  --g2:#7b5ea7;--danger:#ef4444;
  --text:#eef0ff;--dim:#6b7280;--mid:#9ca3af;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:400px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;background:linear-gradient(135deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;}
.tagline{text-align:center;font-size:.78rem;color:var(--dim);margin-bottom:32px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;}
.tab-row{display:flex;gap:6px;margin-bottom:22px;background:var(--s2);border-radius:12px;padding:4px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:9px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--dim);transition:.2s;}
.tab.active{background:var(--g1);color:#000;}
.inp{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--border);border-radius:13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;outline:none;transition:.2s;margin-bottom:11px;}
.inp:focus{border-color:var(--g1);}
.inp::placeholder{color:var(--dim);font-weight:400;}
.pass-wrap{position:relative;margin-bottom:11px;}
.pass-wrap .inp{margin-bottom:0;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:.9rem;padding:4px;}
.btn{width:100%;padding:15px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--g1),#00c49a);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;transition:.2s;margin-bottom:11px;}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-g{width:100%;padding:13px;border-radius:99px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.2s;margin-bottom:11px;}
.btn-g:hover{border-color:var(--g1);}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:.7rem;color:var(--dim);font-weight:600;}
.link{color:var(--g1);font-size:.78rem;cursor:pointer;font-weight:700;}
.err{color:var(--danger);font-size:.75rem;margin-bottom:10px;padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;display:none;}
.suc{color:var(--g1);font-size:.75rem;margin-bottom:8px;display:none;}
.ref-info{background:var(--g1d);border:1px solid rgba(0,245,196,.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:.78rem;color:var(--g1);display:none;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--border);border-radius:22px;padding:26px;width:100%;max-width:360px;text-align:center;}
.mbox h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;margin-bottom:6px;}
.mbox p{font-size:.78rem;color:var(--dim);margin-bottom:20px;line-height:1.6;}
.otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.otp-inp{width:46px;height:54px;background:var(--s2);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:1.3rem;font-weight:800;text-align:center;outline:none;transition:.2s;}
.otp-inp:focus{border-color:var(--g1);}
.timer{font-size:.72rem;color:var(--dim);margin-bottom:12px;}
.timer span{color:var(--g1);font-weight:700;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s1);border:1px solid var(--border);border-radius:99px;padding:11px 22px;font-size:.8rem;font-weight:700;opacity:0;transition:.3s;z-index:99999;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:rgba(0,245,196,.35);color:var(--g1);}
#toast.err{border-color:rgba(239,68,68,.35);color:var(--danger);}
#loader{position:fixed;inset:0;background:rgba(6,6,16,.8);z-index:9998;align-items:center;justify-content:center;display:none;}
#loader.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(0,245,196,.2);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="toast"></div>
<div id="loader"><div class="spinner"></div></div>

<!-- OTP Modal -->
<div class="modal" id="otp-modal">
  <div class="mbox">
    <h2>Verify Email ✉️</h2>
    <p id="otp-sub">OTP aapki email pe bheja gaya hai</p>
    <div class="otp-row">
      <input class="otp-inp" type="tel" maxlength="1" id="o1" oninput="otpMove(this,'o2')" onkeydown="otpBack(event,this,'')">
      <input class="otp-inp" type="tel" maxlength="1" id="o2" oninput="otpMove(this,'o3')" onkeydown="otpBack(event,this,'o1')">
      <input class="otp-inp" type="tel" maxlength="1" id="o3" oninput="otpMove(this,'o4')" onkeydown="otpBack(event,this,'o2')">
      <input class="otp-inp" type="tel" maxlength="1" id="o4" oninput="otpMove(this,'o5')" onkeydown="otpBack(event,this,'o3')">
      <input class="otp-inp" type="tel" maxlength="1" id="o5" oninput="otpMove(this,'o6')" onkeydown="otpBack(event,this,'o4')">
      <input class="otp-inp" type="tel" maxlength="1" id="o6" oninput="otpMove(this,'')"   onkeydown="otpBack(event,this,'o5')">
    </div>
    <div class="timer">Resend in <span id="otp-timer">60</span>s</div>
    <button class="btn" onclick="verifyOTP()">VERIFY & CREATE ACCOUNT</button>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:4px;">
      <span class="link" id="resend-btn" onclick="resendOTP()" style="opacity:.4;pointer-events:none;">Resend OTP</span>
      <span style="color:var(--dim);font-size:.78rem;">·</span>
      <span class="link" onclick="cancelOTP()">Cancel</span>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="brand">⚡ CASHVIBE</div>
  <div class="tagline">Earn coins. Withdraw real cash. 💸</div>
  <div class="card">
    <div class="tab-row">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN -->
    <div id="frm-login">
      <div id="err-login" class="err"></div>
      <input class="inp" type="email" id="l-email" placeholder="Email address" autocomplete="email">
      <div class="pass-wrap">
        <input class="inp" type="password" id="l-pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye-btn" onclick="togglePass('l-pass',this)" tabindex="-1">👁️</button>
      </div>
      <div style="text-align:right;margin-bottom:14px;">
        <span class="link" onclick="switchTab('forgot')">Forgot Password?</span>
      </div>
      <button class="btn" onclick="doLogin()">LOGIN</button>
      <div class="divider"><span>OR</span></div>
      <button class="btn-g" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.82l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP -->
    <div id="frm-signup" style="display:none;">
      <div id="ref-banner" class="ref-info">🎁 Referral code applied! Signup pe bonus coins milenge.</div>
      <div id="err-signup" class="err"></div>
      <input class="inp" type="text" id="s-name" placeholder="Aapka naam" autocomplete="name">
      <input class="inp" type="email" id="s-email" placeholder="Email address" autocomplete="email">
      <input class="inp" type="tel" id="s-mobile" placeholder="Mobile number (10 digits)" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <div class="pass-wrap">
        <input class="inp" type="password" id="s-pass" placeholder="Password (6+ characters)" autocomplete="new-password">
        <button class="eye-btn" onclick="togglePass('s-pass',this)" tabindex="-1">👁️</button>
      </div>
      <input class="inp" type="text" id="s-ref" placeholder="Referral code (optional)" style="text-transform:uppercase;letter-spacing:3px;" oninput="this.value=this.value.toUpperCase()">
      <button class="btn" onclick="doSignup()">CREATE ACCOUNT</button>
      <div class="divider"><span>OR</span></div>
      <button class="btn-g" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.82l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- FORGOT -->
    <div id="frm-forgot" style="display:none;">
      <div id="err-forgot" class="err"></div>
      <div id="suc-forgot" class="suc"></div>
      <p style="font-size:.8rem;color:var(--dim);margin-bottom:14px;">Email enter karo — reset link bhejenge.</p>
      <input class="inp" type="email" id="f-email" placeholder="Email address">
      <button class="btn" onclick="sendReset()">SEND RESET LINK</button>
      <div style="text-align:center;margin-top:8px;">
        <span class="link" onclick="switchTab('login')">← Back to Login</span>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcJUEisvxELb-wmY7lJqFMj4xEiL9LLQg",
  authDomain: "cashvibe.in",
  databaseURL: "https://cash-vibe-default-rtdb.firebaseio.com",
  projectId: "cash-vibe",
  storageBucket: "cash-vibe.appspot.com",
  messagingSenderId: "547096717498",
  appId: "1:547096717498:web:5d73026c5e743c2bf2ba83"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// EmailJS — fallback
const EJS = { svc:'service_oj0f4yi', tpl:'template_8a71wd8', pub:'GfTjqzWL0CDqCT4Z8' };
// Brevo — primary OTP sender
const BREVO = { key:'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', from:'no-reply@cashvibe.in', name:'CashVibe' };

// STATE
let pendingEmail='', pendingPass='', pendingName='', pendingRef='', pendingMobile='';
let generatedOTP = '';
let otpTimerInterval = null;
const TODAY = new Date().toLocaleDateString();

// ── URL referral ──
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) {
  document.getElementById('s-ref').value = urlRef.toUpperCase();
  document.getElementById('ref-banner').style.display = 'block';
  switchTab('signup');
}

// ── Auth redirect ──
auth.onAuthStateChanged(u => { if (u) window.location.replace('dashboard.html'); });

// ── Device Fingerprint ──
function getDeviceId() {
  const ua = navigator.userAgent;
  const sc = screen.width + 'x' + screen.height;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const lang = navigator.language;
  const raw = ua + sc + tz + lang;
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(36);
}

// ── TAB SWITCH ──
function switchTab(tab) {
  ['login','signup','forgot'].forEach(t => {
    document.getElementById('frm-'+t).style.display = t===tab ? 'block' : 'none';
    const el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t===tab);
  });
  document.querySelectorAll('.err,.suc').forEach(e => e.style.display='none');
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function hideErr(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + (type||'ok');
  setTimeout(() => t.className = '', 3500);
}
function loader(show) {
  document.getElementById('loader').classList.toggle('show', show);
}
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁️' : '🙈';
}

// ── SIGNUP ──
async function doSignup() {
  hideErr('err-signup');
  const name   = document.getElementById('s-name').value.trim();
  const email  = document.getElementById('s-email').value.trim().toLowerCase();
  const mobile = document.getElementById('s-mobile').value.trim();
  const pass   = document.getElementById('s-pass').value.trim();
  const ref    = document.getElementById('s-ref').value.trim().toUpperCase();

  // Validate
  if (!name || name.length < 2)            { showErr('err-signup','Naam kam se kam 2 characters ka hona chahiye'); return; }
  if (!email || !email.includes('@'))       { showErr('err-signup','Valid email enter karo'); return; }
  if (!/^[6-9]\d{9}$/.test(mobile))        { showErr('err-signup','Valid 10-digit mobile number enter karo'); return; }
  if (pass.length < 6)                      { showErr('err-signup','Password 6+ characters ka hona chahiye'); return; }

  loader(true);

  try {
    // ── CHECK 1 + 2: Email & Mobile duplicate check (DB scan) ──
    const allUsersSnap = await db.ref('users').once('value');
    let emailExists = false;
    let mobileExists = false;
    if (allUsersSnap.exists()) {
      allUsersSnap.forEach(c => {
        const u = c.val();
        if (u.email && u.email.toLowerCase() === email) emailExists = true;
        if (u.mobile && u.mobile === mobile) mobileExists = true;
      });
    }
    if (emailExists) {
      loader(false);
      showErr('err-signup', '❌ Yeh email pehle se registered hai. Login karo ya alag email use karo.');
      return;
    }
    if (mobileExists) {
      loader(false);
      showErr('err-signup', '❌ Yeh mobile number pehle se registered hai. Alag number use karo.');
      return;
    }

        // ── CHECK 3: Device already has account? ──
    const deviceId = getDeviceId();
    const deviceSnap = await db.ref('devices/' + deviceId).once('value');
    if (deviceSnap.exists()) {
      const dv = deviceSnap.val();
      if (dv.uid && dv.blocked !== true) {
        // Device pe account hai - check karo kitne hain
        const usersOnDevice = dv.accounts ? Object.keys(dv.accounts).length : 1;
        if (usersOnDevice >= 2) {
          loader(false);
          showErr('err-signup', '❌ Is device se pehle se 2 accounts bane hain. Naya account nahi ban sakta.');
          return;
        }
      }
    }

    // Sab check pass — OTP bhejo
    pendingEmail = email; pendingPass = pass;
    pendingName = name; pendingRef = ref; pendingMobile = mobile;

    const sent = await sendOTPEmail(email, name);
    loader(false);
    if (sent) openOTPModal();

  } catch(e) {
    loader(false);
    showErr('err-signup', 'Error: ' + e.message);
  }
}

// ── LOGIN ──
async function doLogin() {
  hideErr('err-login');
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass  = document.getElementById('l-pass').value.trim();

  if (!email || !email.includes('@')) { showErr('err-login','Valid email enter karo'); return; }
  if (!pass)                           { showErr('err-login','Password enter karo'); return; }

  loader(true);
  try {
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    loader(false);
    const msg =
      e.code==='auth/user-not-found'     ? '❌ Koi account nahi mila. Pehle signup karo.' :
      e.code==='auth/wrong-password'     ? '❌ Wrong password. Dobara try karo.' :
      e.code==='auth/invalid-credential' ? '❌ Email ya password galat hai.' :
      e.code==='auth/too-many-requests'  ? '❌ Bahut attempts ho gaye. Thodi der baad try karo.' :
      '❌ Login failed: ' + e.message;
    showErr('err-login', msg);
  }
}

// ── GOOGLE LOGIN ──
async function doGoogle() {
  loader(true);
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    const snap = await db.ref('users/' + user.uid).once('value');
    if (!snap.exists()) {
      const bonus = await getBonus('signup_bonus', 400);
      await db.ref('users/' + user.uid).set({
        name: user.displayName || 'User',
        email: user.email,
        mobile: '',
        balance: bonus,
        referredBy: 'DIRECT',
        joinDate: TODAY,
        status: 'active'
      });
      // Register device
      const deviceId = getDeviceId();
      await db.ref('devices/' + deviceId + '/accounts/' + user.uid).set(true);
      await db.ref('devices/' + deviceId).update({ uid: user.uid, lastLogin: Date.now() });
    }
  } catch(e) {
    loader(false);
    if (e.code !== 'auth/popup-closed-by-user') {
      toast('Google login failed: ' + e.message, 'err');
    }
  }
}

// ── FORGOT PASSWORD ──
async function sendReset() {
  hideErr('err-forgot');
  document.getElementById('suc-forgot').style.display = 'none';
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showErr('err-forgot','Valid email enter karo'); return; }
  loader(true);
  try {
    await auth.sendPasswordResetEmail(email);
    loader(false);
    document.getElementById('suc-forgot').textContent = '✅ Reset link bhej diya! Email check karo.';
    document.getElementById('suc-forgot').style.display = 'block';
  } catch(e) {
    loader(false);
    showErr('err-forgot', e.code==='auth/user-not-found' ? '❌ Is email ka koi account nahi mila.' : '❌ ' + e.message);
  }
}

// ── HELPER: Get bonus amount from Firebase ──
async function getBonus(key, fallback) {
  try {
    const s = await db.ref('app_control/' + key).once('value');
    return s.val() || fallback;
  } catch(e) { return fallback; }
}

// ── OTP ──
function openOTPModal() {
  document.getElementById('otp-sub').textContent = pendingEmail + ' pe 6-digit OTP bheja gaya hai';
  ['o1','o2','o3','o4','o5','o6'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('otp-modal').classList.add('open');
  document.getElementById('o1').focus();
  startOTPTimer();
}

function cancelOTP() {
  document.getElementById('otp-modal').classList.remove('open');
  clearInterval(otpTimerInterval);
  generatedOTP = '';
}

function startOTPTimer() {
  let sec = 60;
  const timerEl = document.getElementById('otp-timer');
  const resendBtn = document.getElementById('resend-btn');
  resendBtn.style.opacity = '.4';
  resendBtn.style.pointerEvents = 'none';
  clearInterval(otpTimerInterval);
  otpTimerInterval = setInterval(() => {
    sec--;
    timerEl.textContent = sec;
    if (sec <= 0) {
      clearInterval(otpTimerInterval);
      resendBtn.style.opacity = '1';
      resendBtn.style.pointerEvents = 'auto';
    }
  }, 1000);
}

async function resendOTP() {
  const sent = await sendOTPEmail(pendingEmail, pendingName);
  if (sent) { startOTPTimer(); toast('OTP dobara bhej diya!', 'ok'); }
}

function otpMove(el, nextId) {
  el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
  if (el.value && nextId) document.getElementById(nextId).focus();
  const all = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
  if (all.length === 6) setTimeout(verifyOTP, 100);
}

function otpBack(e, el, prevId) {
  if (e.key==='Backspace' && !el.value && prevId) document.getElementById(prevId).focus();
}

async function verifyOTP() {
  const entered = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
  if (entered.length < 6) { toast('Poore 6 digits enter karo','err'); return; }
  if (entered !== generatedOTP) { toast('Galat OTP! Dobara try karo.','err'); return; }

  loader(true);
  cancelOTP();
  try {
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const cred = await auth.createUserWithEmailAndPassword(pendingEmail, pendingPass);
    const user = cred.user;
    await user.updateProfile({ displayName: pendingName });

    const signupBonus = await getBonus('signup_bonus', 400);
    const refBy = pendingRef || 'DIRECT';

    // Save user profile
    await db.ref('users/' + user.uid).set({
      name: pendingName,
      email: pendingEmail,
      mobile: pendingMobile,
      balance: signupBonus,
      referredBy: refBy,
      joinDate: TODAY,
      status: 'active'
    });

    // Register device
    const deviceId = getDeviceId();
    await db.ref('devices/' + deviceId + '/accounts/' + user.uid).set(true);
    await db.ref('devices/' + deviceId).update({ uid: user.uid, lastLogin: Date.now() });

    // Refer log save karo
    if (pendingRef && pendingRef !== 'DIRECT') {
      let referrerUid = null;
      const allSnap = await db.ref('users').once('value');
      allSnap.forEach(c => {
        if (c.key.substring(0,6).toUpperCase() === pendingRef) referrerUid = c.key;
      });
      if (referrerUid) {
        const rewardAmt = await getBonus('refer_reward', 500);
        await db.ref('refer_logs/' + user.uid).set({
          from: referrerUid,
          uid: user.uid,
          joinedAt: Date.now(),
          rewardCredited: false,
          rewardAmount: rewardAmt,
          progress: 0
        });
      }
    }
    // onAuthStateChanged → dashboard
  } catch(e) {
    loader(false);
    const msg =
      e.code==='auth/email-already-in-use' ? '❌ Yeh email pehle se registered hai. Login karo.' :
      e.code==='auth/weak-password'        ? '❌ Password bahut weak hai.' :
      '❌ Signup failed: ' + e.message;
    toast(msg, 'err');
  }
}

// ── SEND OTP — Brevo primary, EmailJS fallback ──
async function sendOTPEmail(email, name) {
  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  const subject = 'CashVibe OTP: ' + generatedOTP;
  const body = 'Hi ' + name + ',\n\nAapka CashVibe verification OTP hai:\n\n' + generatedOTP + '\n\nYeh OTP 10 minutes mein expire hoga. Kisi ke saath share mat karo.\n\n— CashVibe Team';

  // ── Try Brevo first ──
  try {
    const res = await fetch('https://api.brevo.com/v3/smtp/email', {
      method: 'POST',
      headers: {
        'api-key': BREVO.key,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        sender: { email: BREVO.from, name: BREVO.name },
        to: [{ email: email, name: name }],
        subject: subject,
        textContent: body
      })
    });
    if (res.ok) {
      toast('OTP ' + email + ' pe bheja gaya!', 'ok');
      return true;
    } else {
      const err = await res.json();
      console.log('Brevo error:', err);
    }
  } catch(e) {
    console.log('Brevo failed:', e.message);
  }

  // ── Fallback: EmailJS ──
  try {
    emailjs.init(EJS.pub);
    await emailjs.send(EJS.svc, EJS.tpl, {
      to_email: email,
      to_name: name,
      otp_code: generatedOTP,
      subject: subject,
      message: body
    });
    toast('OTP ' + email + ' pe bheja gaya!', 'ok');
    return true;
  } catch(e) {
    console.log('EmailJS failed:', e);
  }

  // ── Last resort: show in toast (dev/test) ──
  toast('OTP: ' + generatedOTP + ' (email failed)', 'err');
  return true;
}
</script>
